services:
  # 1. Tự động cấu hình Backend
  - type: web
    name: cabin-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app
    rootDir: Backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cabin-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SKIP_MSSQL_UNICODE_FIX
        value: "true"

# 2. Tự động cấu hình Database
databases:
  - name: cabin-db
    databaseName: cabin_db
    user: cabin_user
    plan: free
